info:
  name: Cadastrar Usuário
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/sign-up/email
  body:
    type: json
    data: |-
      {
        "email": "diretoria@jimcarrey.com",
        "password": "trimundial",
        "name": "Jim Carrey"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Descrição: Cria uma nova conta de usuário.
  Segurança: A senha deve conter no mínimo 8 caracteres (regra nativa BetterAuth).
  Acesso: Público.
